<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virsihaku</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9ff, #e6efff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(42 74 140 / 0.15);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        header {
            background: #2a4a8c;
            color: white;
            padding: 2rem 2.5rem;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.25rem; font-family: 'Space Grotesk', sans-serif; }
        .subtitle { margin: 8px 0 0; opacity: 0.95; }

        main { padding: 2.5rem; }

        .tabs {
            display: flex;
            background: #f8fafc;
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            border: none;
            color: inherit;
            font: inherit;
        }
        .tab.active {
            background: white;
            box-shadow: 0 10px 15px -3px rgb(42 74 140 / 0.1);
            color: #2a4a8c;
        }
        .tab:focus-visible {
            outline: 3px solid rgb(42 74 140 / 0.35);
            outline-offset: 2px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.45rem;
            margin-bottom: 1rem;
        }
        input:focus {
            border-color: #2a4a8c;
            outline: none;
        }

        .helptext {
            margin: -6px 0 1rem 0;
            color: #64748b;
            font-size: 0.95rem;
        }

        button {
            width: 100%;
            padding: 18px;
            background: #2a4a8c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .result {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.8rem;
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .result.show { display: flex; }

        .virsi-num {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1e3a8a;
            margin: 0 0 8px 0;
        }
        .alkusana {
            font-size: 1.45rem;
            font-weight: 500;
            color: #166534;
            background: white;
            padding: 18px;
            border-radius: 10px;
            border-left: 7px solid #166534;
            line-height: 1.45;
        }
        .info {
            color: #64748b;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Virsihaku</h1>
            <p class="subtitle">1938 ↔ 1986 virsikirja</p>
        </header>

        <main>
            <div class="tabs" role="tablist" aria-label="Hakutila">
                <button id="tab-old" class="tab active" type="button" role="tab" aria-controls="panel-search" aria-selected="true" tabindex="0" data-mode="0">Vanha numero → Nykyinen</button>
                <button id="tab-new" class="tab" type="button" role="tab" aria-controls="panel-search" aria-selected="false" tabindex="-1" data-mode="1">Nykyinen numero → Vanha</button>
                <button id="tab-name" class="tab" type="button" role="tab" aria-controls="panel-search" aria-selected="false" tabindex="-1" data-mode="2">Nimihaku</button>
            </div>

            <div id="panel-search" role="tabpanel" tabindex="0" aria-labelledby="tab-old">
            <form id="search-form">
                <label id="input-label" for="search-input" style="display:block; margin-bottom:8px; font-weight:500;">1938 virren numero</label>
                <input type="text" id="search-input" placeholder="Syötä numero tai alkusana" autocomplete="off" maxlength="40" aria-describedby="input-help">
                <div id="input-help" class="helptext">Max 40 merkkiä.</div>

                <button type="submit">🔍 Hae</button>
            </form>

            <div id="result" class="result" role="status" aria-live="polite">
                <div id="result-content"></div>
            </div>
            </div>
        </main>
    </div>

    <script>
        let mapping = null;
        let alkusanat = null;
        let currentMode = 0;   // 0 = vanha→nykyinen, 1 = nykyinen→vanha, 2 = nimihaku
        let lastFocusedTabId = 'tab-old';
        const MAX_QUERY_CHARS = 40;

        async function loadData() {
            try {
                const [mapRes, sanaRes] = await Promise.all([
                    fetch('virret_1938_to_1986.json'),
                    fetch('alkusanat.json')
                ]);
                mapping = await mapRes.json();
                alkusanat = await sanaRes.json();
            } catch (e) {
                showError('Virhe datan latauksessa. Tarkista tiedostot virret_1938_to_1986.json ja alkusanat.json.');
            }
        }

        function el(tag, className, text) {
            const node = document.createElement(tag);
            if (className) node.className = className;
            if (text !== undefined) node.textContent = text;
            return node;
        }

        function showError(message) {
            const p = el('p', null, message);
            p.style.color = '#b91c1c';
            showResultNode(p);
        }

        function setMode(mode) {
            currentMode = mode;
            const tabs = [
                document.getElementById('tab-old'),
                document.getElementById('tab-new'),
                document.getElementById('tab-name')
            ];
            tabs.forEach((tab, idx) => {
                const active = idx === mode;
                tab.classList.toggle('active', active);
                tab.setAttribute('aria-selected', active ? 'true' : 'false');
                tab.tabIndex = active ? 0 : -1;
            });

            const label = document.getElementById('input-label');
            const input = document.getElementById('search-input');
            const panel = document.getElementById('panel-search');
            const activeTab = tabs[mode] || tabs[0];
            if (activeTab) panel.setAttribute('aria-labelledby', activeTab.id);

            if (mode === 0) {
                label.textContent = "Vanha numero (1938)";
                input.placeholder = "esim. 42";
                input.inputMode = 'numeric';
                input.pattern = '\\d*';
            } else if (mode === 1) {
                label.textContent = "Nykyinen numero (1986)";
                input.placeholder = "esim. 266";
                input.inputMode = 'numeric';
                input.pattern = '\\d*';
            } else {
                label.textContent = "Alkusana tai osa virren nimestä";
                input.placeholder = "esim. Hoosianna, Jumala loi, Jeesus";
                input.inputMode = 'text';
                input.removeAttribute('pattern');
            }
            input.focus();
        }

        function showResultNode(node) {
            const content = document.getElementById('result-content');
            content.replaceChildren(node);
            document.getElementById('result').classList.add('show');
        }

        function search() {
            if (!mapping || !alkusanat) {
                showError("Dataa ladataan vielä...");
                return;
            }

            const input = document.getElementById('search-input');
            let query = input.value.trim();
            if (query.length > MAX_QUERY_CHARS) {
                query = query.slice(0, MAX_QUERY_CHARS);
                input.value = query;
            }
            if (!query) {
                showError("Syötä hakuehto!");
                return;
            }

            if (currentMode === 0 || currentMode === 1) {
                // ==================== NUMEROHaku ====================
                const num = parseInt(query, 10);
                if (isNaN(num)) {
                    showError("Syötä numero.");
                } else {
                    let oldNum, newNum, sana;

                    if (currentMode === 0) {
                        // Vanha → Nykyinen
                        newNum = mapping["1938_to_1986"][num.toString()];
                        oldNum = num;
                    } else {
                        // Nykyinen → Vanha
                        oldNum = mapping["1986_to_1938"][num.toString()];
                        newNum = num;
                    }

                    sana = alkusanat[newNum ? newNum.toString() : oldNum.toString()] || "Aloitussana ei tiedossa";

                    if (newNum !== undefined && newNum !== null) {
                        const wrap = el('div');
                        if (currentMode === 0) {
                            wrap.append(
                                el('div', 'virsi-num', `${oldNum} → ${newNum}`),
                                el('div', 'alkusana', sana),
                                el('div', 'info', `Virsi ${oldNum} (1938) vastaa virttä ${newNum} (1986)`)
                            );
                        } else {
                            wrap.append(
                                el('div', 'virsi-num', `${newNum} → ${oldNum}`),
                                el('div', 'alkusana', sana),
                                el('div', 'info', `Virsi ${newNum} (1986) vastaa virttä ${oldNum} (1938)`)
                            );
                        }
                        showResultNode(wrap);
                    } else {
                        showError(`Virttä numero ${num} ei löytynyt.`);
                    }
                }
            } else {
                // ==================== NIMIHAKU ====================
                const lowerQuery = query.toLowerCase();
                let found = false;
                const wrap = el('div');
                const h = el('h3', null, 'Löydetyt virret:');
                h.style.margin = '0 0 15px 0';
                wrap.append(h);

                for (const [numStr, sana] of Object.entries(alkusanat)) {
                    if (sana.toLowerCase().includes(lowerQuery) || numStr === query) {
                        found = true;
                        const num = parseInt(numStr);
                        const oldNum = mapping["1986_to_1938"][numStr] || "—";

                        const item = el('div');
                        item.style.marginBottom = '20px';
                        item.style.padding = '14px';
                        item.style.background = 'white';
                        item.style.borderRadius = '10px';
                        item.style.borderLeft = '6px solid #166534';
                        item.append(
                            el('div', 'virsi-num', `${num} → ${oldNum}`),
                            el('div', 'alkusana', sana),
                            el('div', 'info', `Virsi ${num} (1986) vastaa virttä ${oldNum} (1938)`)
                        );
                        wrap.append(item);
                    }
                }

                if (!found) {
                    const p = el('p');
                    p.style.color = '#b91c1c';
                    p.append('Ei löytynyt virttä hakuehdolla "');
                    const q = el('span', null, query);
                    p.append(q);
                    p.append('".');
                    showResultNode(p);
                    return;
                }
                showResultNode(wrap);
            }
        }

        // Käynnistys
        document.addEventListener('DOMContentLoaded', () => {
            const tabOld = document.getElementById('tab-old');
            const tabNew = document.getElementById('tab-new');
            const tabName = document.getElementById('tab-name');
            const tabs = [tabOld, tabNew, tabName];

            tabs.forEach((tab) => {
                tab.addEventListener('click', () => {
                    lastFocusedTabId = tab.id;
                    setMode(parseInt(tab.dataset.mode, 10));
                });
                tab.addEventListener('keydown', (e) => {
                    const currentIdx = tabs.indexOf(tab);
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        const dir = e.key === 'ArrowRight' ? 1 : -1;
                        const nextIdx = (currentIdx + dir + tabs.length) % tabs.length;
                        tabs[nextIdx].focus();
                    }
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        lastFocusedTabId = tab.id;
                        setMode(parseInt(tab.dataset.mode, 10));
                    }
                });
                tab.addEventListener('focus', () => {
                    lastFocusedTabId = tab.id;
                });
            });

            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                search();
            });

            const input = document.getElementById('search-input');
            input.maxLength = MAX_QUERY_CHARS;
            const help = document.getElementById('input-help');
            if (help) help.textContent = `Max ${MAX_QUERY_CHARS} merkkiä.`;
            let isComposing = false;
            input.addEventListener('compositionstart', () => { isComposing = true; });
            input.addEventListener('compositionend', () => {
                isComposing = false;
                if (input.value.length > MAX_QUERY_CHARS) {
                    input.value = input.value.slice(0, MAX_QUERY_CHARS);
                }
            });
            input.addEventListener('input', () => {
                if (isComposing) return;
                if (input.value.length > MAX_QUERY_CHARS) {
                    input.value = input.value.slice(0, MAX_QUERY_CHARS);
                }
            });

            loadData();
            setMode(0);
            document.getElementById('search-input').focus();
        });
    </script>
</body>
</html>
