                "594": 501, "596": 497, "598": 451, "599": 441, "605": 582, "606": 592, "607": 584, "608": 591,
                "609": 581, "610": 258, "611": 260, "612": 455, "613": 579, "614": 588, "615": 610, "617": 615,
                "618": 616, "619": 617, "620": 618, "622": 589, "623": 620, "624": 593, "625": 586, "626": 622,
                "627": 612, "628": 613, "629": 619, "631": 600, "632": 623
            }
        };

        let currentDirection = 0; // 0 = vanha→nykyinen, 1 = nykyinen→vanha
        const history = [];

        function setDirection(dir) {
            currentDirection = dir;
            document.getElementById('tab-old').classList.toggle('active', dir === 0);
            document.getElementById('tab-new').classList.toggle('active', dir === 1);
            
            const label = document.getElementById('input-label');
            label.textContent = dir === 0 
                ? '1938 virren numero' 
                : '1986 virren numero';
            
            document.getElementById('number-input').focus();
        }

        function convert() {
            const inputEl = document.getElementById('number-input');
            const numStr = inputEl.value.trim();
            
            if (!numStr) {
                alert("Syötä virren numero!");
                return;
            }
            
            const num = parseInt(numStr, 10);
            if (isNaN(num) || num < 1) {
                alert("Virheellinen numero!");
                return;
            }
            
            let resultHTML = '';
            let fromBook = '';
            let toBook = '';
            
            if (currentDirection === 0) {
                // Vanha → Nykyinen
                fromBook = '1938';
                toBook = '1986';
                const mapping = mappings["1938_to_1986"];
                const target = mapping[num.toString()];
                
                if (target === null || target === undefined) {
                    resultHTML = `<span style="color:#b91c1c">Virttä numero <strong>${num}</strong> ei ole nykyisessä (1986) virsikirjassa tai vastaavuus puuttuu.</span>`;
                } else {
                    resultHTML = `
                        <div class="old-num">${num}</div>
                        <div class="arrow">→</div>
                        <div class="new-num">${target}</div>
                        <div class="info">Virsi ${num} (1938) vastaa virttä ${target} (1986)</div>
                    `;
                }
            } else {
                // Nykyinen → Vanha
                fromBook = '1986';
                toBook = '1938';
                const mapping = mappings["1986_to_1938"];
                let target = mapping[num.toString()];
                
                if (target === null || target === undefined) {
                    resultHTML = `<span style="color:#b91c1c">Virttä numero <strong>${num}</strong> ei löydy 1938-kirjasta tai vastaavuus puuttuu.</span>`;
                } else if (Array.isArray(target)) {
                    resultHTML = `
                        <div class="new-num">${num}</div>
                        <div class="arrow">←</div>
                        <div style="font-size:2.2rem;font-weight:700;color:#1e3a8a"> ${target.join(' , ')} </div>
                        <div class="info">Virsi ${num} (1986) vastaa vanhoja virsiä ${target.join(', ')} (1938)</div>
                    `;
                } else {
                    resultHTML = `
                        <div class="new-num">${num}</div>
                        <div class="arrow">←</div>
                        <div class="old-num">${target}</div>
                        <div class="info">Virsi ${num} (1986) vastaa virttä ${target} (1938)</div>
                    `;
                }
            }
            
            // Näytä tulos
            const resultDiv = document.getElementById('result');
            const contentDiv = document.getElementById('result-content');
            contentDiv.innerHTML = resultHTML;
            resultDiv.classList.add('show');
            
            // Tallenna historiaan
            history.unshift({
                direction: currentDirection,
                number: num,
                html: resultHTML
            });
            
            if (history.length > 8) history.pop();
            
            renderHistory();
            
            // Tyhjennä input
            inputEl.value = '';
            inputEl.focus();
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = `<div style="font-size:0.95rem;color:#64748b;margin-bottom:8px">Viimeisimmät haut:</div>`;
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = item.html;
                container.appendChild(div);
            });
            
            if (history.length === 0) {
                container.innerHTML += `<div style="text-align:center;color:#94a3b8;padding:20px">Ei aiempia hakuja vielä</div>`;
            }
        }

        // Käynnistä ohjelma
        window.onload = function() {
            // Aseta ensimmäinen tab aktiiviseksi
            setDirection(0);
            
            // Anna inputille fokus
            document.getElementById('number-input').focus();
            
            console.log('%cVirsihaku valmis! 🎉', 'color:#2a4a8c;font-weight:bold');
        };
    </script>
</body>
</html>
