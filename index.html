<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virsihaku</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9ff, #e6efff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(42 74 140 / 0.15);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        header {
            background: #2a4a8c;
            color: white;
            padding: 2rem 2.5rem;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.2rem; font-family: 'Space Grotesk', sans-serif; }
        .subtitle { margin: 8px 0 0; opacity: 0.95; }

        main { padding: 2.5rem; }

        .tabs {
            display: flex;
            background: #f8fafc;
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            box-shadow: 0 10px 15px -3px rgb(42 74 140 / 0.1);
            color: #2a4a8c;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.45rem;
            margin-bottom: 1rem;
        }
        input:focus { border-color: #2a4a8c; outline: none; }

        button {
            width: 100%;
            padding: 18px;
            background: #2a4a8c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .result {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.8rem;
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .result.show { display: flex; }

        .virsi-num {
            font-size: 2.9rem;
            font-weight: 700;
            color: #1e3a8a;
            margin: 0;
        }
        .alkusana {
            font-size: 1.4rem;
            font-weight: 500;
            color: #166534;
            background: white;
            padding: 18px;
            border-radius: 10px;
            border-left: 7px solid #166534;
            line-height: 1.4;
        }
        .info { color: #64748b; font-size: 1.05rem; }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Virsihaku</h1>
            <p class="subtitle">1938 ↔ 1986 virsikirja + aloitussanat</p>
        </header>

        <main>
            <div class="tabs">
                <div id="tab-old" class="tab active" onclick="setDirection(0)">Vanha → Nykyinen</div>
                <div id="tab-new" class="tab" onclick="setDirection(1)">Nykyinen → Vanha</div>
            </div>

            <label id="input-label" style="display:block; margin-bottom:8px; font-weight:500;">1938 virren numero</label>
            <input type="number" id="number-input" placeholder="esim. 42" onkeypress="if(event.key==='Enter') convert()">

            <button onclick="convert()">🔍 Hae vastaavuus</button>

            <div id="result" class="result">
                <div id="result-content"></div>
            </div>
        </main>
    </div>

    <script>
        let mapping = null;
        let alkusanat = null;
        let currentDirection = 0;

        async function loadData() {
            try {
                const [mapRes, sanaRes] = await Promise.all([
                    fetch('virret_1938_to_1986.json'),
                    fetch('alkusanat.json')
                ]);

                mapping = await mapRes.json();
                alkusanat = await sanaRes.json();

                console.log('✅ Virsidata ladattu onnistuneesti');
            } catch (e) {
                console.error(e);
                alert('Datan lataus epäonnistui. Tarkista että tiedostot virret_1938_to_1986.json ja alkusanat.json ovat samassa kansiossa.');
            }
        }

        function setDirection(dir) {
            currentDirection = dir;
            document.getElementById('tab-old').classList.toggle('active', dir === 0);
            document.getElementById('tab-new').classList.toggle('active', dir === 1);
            document.getElementById('input-label').textContent = dir === 0 
                ? '1938 virren numero' 
                : '1986 virren numero';
        }

        function getAlkusana(num) {
            if (!alkusanat) return "Aloitussana ei tiedossa";
            return alkusanat[num.toString()] || "Aloitussana ei tiedossa";
        }

        function convert() {
            if (!mapping || !alkusanat) {
                alert("Odota hetki, dataa vielä ladataan...");
                return;
            }

            const input = document.getElementById('number-input').value.trim();
            if (!input) return alert("Syötä virren numero!");

            const num = parseInt(input);
            if (isNaN(num) || num < 1) return alert("Virheellinen numero!");

            let resultHTML = '';

            if (currentDirection === 0) {
                const target = mapping["1938_to_1986"][num.toString()];
                if (target == null) {
                    resultHTML = `<p style="color:#b91c1c">Virttä numero ${num} ei löydy nykyisestä virsikirjasta (1986).</p>`;
                } else {
                    const sana = getAlkusana(target);
                    resultHTML = `
                        <div class="virsi-num">${num} → ${target}</div>
                        <div class="alkusana">${sana}</div>
                        <div class="info">Virsi ${num} (1938) vastaa virttä ${target} (1986)</div>
                    `;
                }
            } else {
                let target = mapping["1986_to_1938"][num.toString()];
                if (target == null) {
                    resultHTML = `<p style="color:#b91c1c">Virttä numero ${num} ei löydy vanhasta virsikirjasta (1938).</p>`;
                } else if (Array.isArray(target)) {
                    const sana = getAlkusana(num);
                    resultHTML = `
                        <div class="virsi-num">${num} ← ${target.join(', ')}</div>
                        <div class="alkusana">${sana}</div>
                        <div class="info">Virsi ${num} (1986) vastaa vanhoja virsiä ${target.join(', ')} (1938)</div>
                    `;
                } else {
                    const sana = getAlkusana(num);
                    resultHTML = `
                        <div class="virsi-num">${num} ← ${target}</div>
                        <div class="alkusana">${sana}</div>
                        <div class="info">Virsi ${num} (1986) vastaa virttä ${target} (1938)</div>
                    `;
                }
            }

            document.getElementById('result-content').innerHTML = resultHTML;
            document.getElementById('result').classList.add('show');
        }

        // Käynnistys
        window.onload = () => {
            loadData();
            setDirection(0);
            document.getElementById('number-input').focus();
        };
    </script>
</body>
</html>
