<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virsihaku</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9ff, #e6efff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(42 74 140 / 0.15);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        header {
            background: #2a4a8c;
            color: white;
            padding: 2rem 2.5rem;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.25rem; font-family: 'Space Grotesk', sans-serif; }
        .subtitle { margin: 8px 0 0; opacity: 0.95; }

        main { padding: 2.5rem; }

        .tabs {
            display: flex;
            background: #f8fafc;
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            border: none;
            color: inherit;
            font: inherit;
        }
        .tab.active {
            background: white;
            box-shadow: 0 10px 15px -3px rgb(42 74 140 / 0.1);
            color: #2a4a8c;
        }
        .tab:focus-visible {
            outline: 3px solid rgb(42 74 140 / 0.35);
            outline-offset: 2px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.45rem;
            margin-bottom: 1rem;
        }
        input:focus {
            border-color: #2a4a8c;
            outline: none;
        }

        button {
            width: 100%;
            padding: 18px;
            background: #2a4a8c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .result {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.8rem;
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .result.show { display: flex; }

        .virsi-num {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1e3a8a;
            margin: 0 0 8px 0;
        }
        .alkusana {
            font-size: 1.45rem;
            font-weight: 500;
            color: #166534;
            background: white;
            padding: 18px;
            border-radius: 10px;
            border-left: 7px solid #166534;
            line-height: 1.45;
        }
        .info {
            color: #64748b;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Virsihaku</h1>
            <p class="subtitle">1938 ↔ 1986 virsikirja</p>
        </header>

        <main>
            <div class="tabs" role="tablist" aria-label="Hakutila">
                <button id="tab-old" class="tab active" type="button" role="tab" aria-selected="true" tabindex="0" data-mode="0">Vanha numero → Nykyinen</button>
                <button id="tab-new" class="tab" type="button" role="tab" aria-selected="false" tabindex="-1" data-mode="1">Nykyinen numero → Vanha</button>
                <button id="tab-name" class="tab" type="button" role="tab" aria-selected="false" tabindex="-1" data-mode="2">Nimihaku</button>
            </div>

            <form id="search-form">
                <label id="input-label" for="search-input" style="display:block; margin-bottom:8px; font-weight:500;">1938 virren numero</label>
                <input type="text" id="search-input" placeholder="Syötä numero tai alkusana" autocomplete="off">

                <button type="submit">🔍 Hae</button>
            </form>

            <div id="result" class="result">
                <div id="result-content"></div>
            </div>
        </main>
    </div>

    <script>
        let mapping = null;
        let alkusanat = null;
        let currentMode = 0;   // 0 = vanha→nykyinen, 1 = nykyinen→vanha, 2 = nimihaku
        let lastFocusedTabId = 'tab-old';

        async function loadData() {
            try {
                const [mapRes, sanaRes] = await Promise.all([
                    fetch('virret_1938_to_1986.json'),
                    fetch('alkusanat.json')
                ]);
                mapping = await mapRes.json();
                alkusanat = await sanaRes.json();
                console.log('✅ Data ladattu');
            } catch (e) {
                alert('Virhe datan latauksessa. Tarkista tiedostot virret_1938_to_1986.json ja alkusanat.json');
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const tabs = [
                document.getElementById('tab-old'),
                document.getElementById('tab-new'),
                document.getElementById('tab-name')
            ];
            tabs.forEach((tab, idx) => {
                const active = idx === mode;
                tab.classList.toggle('active', active);
                tab.setAttribute('aria-selected', active ? 'true' : 'false');
                tab.tabIndex = active ? 0 : -1;
            });

            const label = document.getElementById('input-label');
            const input = document.getElementById('search-input');

            if (mode === 0) {
                label.textContent = "Vanha numero (1938)";
                input.placeholder = "esim. 42";
            } else if (mode === 1) {
                label.textContent = "Nykyinen numero (1986)";
                input.placeholder = "esim. 266";
            } else {
                label.textContent = "Alkusana tai osa virren nimestä";
                input.placeholder = "esim. Hoosianna, Jumala loi, Jeesus";
            }
            input.focus();
        }

        function showResultHTML(html) {
            const content = document.getElementById('result-content');
            content.innerHTML = html;
            document.getElementById('result').classList.add('show');
        }

        function showResultNode(node) {
            const content = document.getElementById('result-content');
            content.replaceChildren(node);
            document.getElementById('result').classList.add('show');
        }

        function search() {
            if (!mapping || !alkusanat) {
                alert("Dataa ladataan vielä...");
                return;
            }

            const query = document.getElementById('search-input').value.trim();
            if (!query) return alert("Syötä hakuehto!");

            let resultHTML = '';

            if (currentMode === 0 || currentMode === 1) {
                // ==================== NUMEROHaku ====================
                const num = parseInt(query);
                if (isNaN(num)) {
                    resultHTML = `<p style="color:#b91c1c">Syötä numero.</p>`;
                } else {
                    let oldNum, newNum, sana;

                    if (currentMode === 0) {
                        // Vanha → Nykyinen
                        newNum = mapping["1938_to_1986"][num.toString()];
                        oldNum = num;
                    } else {
                        // Nykyinen → Vanha
                        oldNum = mapping["1986_to_1938"][num.toString()];
                        newNum = num;
                    }

                    sana = alkusanat[newNum ? newNum.toString() : oldNum.toString()] || "Aloitussana ei tiedossa";

                    if (newNum !== undefined && newNum !== null) {
						if (currentMode == 0) {
							resultHTML = `
								<div class="virsi-num">${oldNum} → ${newNum}</div>
								<div class="alkusana">${sana}</div>
								<div class="info">Virsi ${oldNum} (1938) vastaa virttä ${newNum} (1986)</div>
							`	
						}
						else {
							resultHTML = `
								<div class="virsi-num">${newNum} → ${oldNum}</div>
								<div class="alkusana">${sana}</div>
								<div class="info">Virsi ${newNum} (1986) vastaa virttä ${oldNum} (1938)</div>
							`
						}
                        
                    } else {
                        resultHTML = `<p style="color:#b91c1c">Virttä numero ${num} ei löytynyt.</p>`;
                    }
                }
            } else {
                // ==================== NIMIHAKU ====================
                const lowerQuery = query.toLowerCase();
                let found = false;
                resultHTML = '<h3 style="margin:0 0 15px 0;">Löydetyt virret:</h3>';

                for (const [numStr, sana] of Object.entries(alkusanat)) {
                    if (sana.toLowerCase().includes(lowerQuery) || numStr === query) {
                        found = true;
                        const num = parseInt(numStr);
                        const oldNum = mapping["1986_to_1938"][numStr] || "—";

                        resultHTML += `
                            <div style="margin-bottom:20px; padding:14px; background:white; border-radius:10px; border-left:6px solid #166534;">
                                <div class="virsi-num">${num} → ${oldNum}</div>
                                <div class="alkusana">${sana}</div>
                                <div class="info">Virsi ${num} (1986) vastaa virttä ${oldNum} (1938)</div>
                            </div>
                        `;
                    }
                }

                if (!found) {
                    const p = document.createElement('p');
                    p.style.color = '#b91c1c';
                    p.append('Ei löytynyt virttä hakuehdolla "');
                    const q = document.createElement('span');
                    q.textContent = query;
                    p.append(q);
                    p.append('".');
                    showResultNode(p);
                    return;
                }
            }

            showResultHTML(resultHTML);
        }

        // Käynnistys
        window.onload = () => {
            const tabOld = document.getElementById('tab-old');
            const tabNew = document.getElementById('tab-new');
            const tabName = document.getElementById('tab-name');
            const tabs = [tabOld, tabNew, tabName];

            tabs.forEach((tab) => {
                tab.addEventListener('click', () => {
                    lastFocusedTabId = tab.id;
                    setMode(parseInt(tab.dataset.mode, 10));
                });
                tab.addEventListener('keydown', (e) => {
                    const currentIdx = tabs.indexOf(tab);
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        const dir = e.key === 'ArrowRight' ? 1 : -1;
                        const nextIdx = (currentIdx + dir + tabs.length) % tabs.length;
                        tabs[nextIdx].focus();
                    }
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        lastFocusedTabId = tab.id;
                        setMode(parseInt(tab.dataset.mode, 10));
                    }
                });
                tab.addEventListener('focus', () => {
                    lastFocusedTabId = tab.id;
                });
            });

            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                search();
            });

            loadData();
            setMode(0);
            document.getElementById('search-input').focus();
        };
    </script>
</body>
</html>
